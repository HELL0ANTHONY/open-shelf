services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: open_shelf
      DB_USER: open_shelf
      DB_PASSWORD: open_shelf
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_shelf
      POSTGRES_USER: open_shelf
      POSTGRES_PASSWORD: open_shelf
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_shelf -d open_shelf"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  maven-cache:
  postgres-data:
